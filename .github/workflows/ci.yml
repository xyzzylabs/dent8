name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      # The workspace is kept clippy-clean; treat any warning as an error in CI.
      - name: Clippy workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
      # The Postgres adapter is feature-gated; compile-check + lint it too.
      - name: Clippy Postgres adapter
        run: cargo clippy -p dent8-store-postgres --features adapter --all-targets -- -D warnings
      # The CLI's Postgres backend is feature-gated; compile-check + lint it too.
      - name: Clippy CLI Postgres feature
        run: cargo clippy -p dent8-cli --features postgres --all-targets -- -D warnings
      # The CLI's witness commands (Ed25519 signed tree heads) are feature-gated; lint + test.
      - name: Clippy CLI witness feature
        run: cargo clippy -p dent8-cli --features witness --all-targets -- -D warnings
      # The asymmetric (signed) anchor is feature-gated; lint + test it too.
      - name: Clippy signed-anchor feature
        run: cargo clippy -p dent8-core --features signed-anchor --all-targets -- -D warnings
      # The CLI's Parquet export lane (arrow/parquet) is feature-gated; lint + test.
      - name: Clippy CLI export feature
        run: cargo clippy -p dent8-cli --features export --all-targets -- -D warnings
      # The embedded SQLite backend (sqlx) — the second async backend; lint + test (it runs
      # in-memory, no server needed, so its tests run in the default `cargo test --workspace`).
      - name: Clippy SQLite adapter
        run: cargo clippy -p dent8-store-sqlite --all-targets -- -D warnings
      - name: Clippy CLI SQLite feature
        run: cargo clippy -p dent8-cli --features sqlite --all-targets -- -D warnings
      # The minimal build (`--no-default-features` drops signed identity): the docs advertise
      # it, and the identity/witness *fail-closed* fallback arms (`#[cfg(not(feature = …))]`)
      # compile ONLY in this combo — without this step they are never even built in CI.
      - name: Clippy CLI no default features
        run: cargo clippy -p dent8-cli --no-default-features --all-targets -- -D warnings
      - name: Test workspace
        run: cargo test --workspace
      # Runs the `#[cfg(not(feature = …))]` fail-closed tests (e.g. identity configured but
      # not compiled must reject writes), which no other job exercises.
      - name: Test CLI no default features
        run: cargo test -p dent8-cli --no-default-features
      - name: Test signed-anchor feature
        run: cargo test -p dent8-core --features signed-anchor
      - name: Test CLI witness feature
        run: cargo test -p dent8-cli --features witness
      - name: Test export crate
        run: cargo test -p dent8-export

  postgres:
    name: Postgres adapter + CLI smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dent8
          POSTGRES_DB: dent8
        ports:
          - 5432:5432
        # Gate the job on the DB actually accepting connections.
        options: >-
          --health-cmd "pg_isready -U postgres -d dent8"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # The adapter's integration tests run only when DATABASE_URL is set (they skip
      # otherwise — see crates/dent8-store-postgres/src/adapter.rs).
      DATABASE_URL: postgres://postgres:dent8@localhost:5432/dent8
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The integration tests share one database; they self-serialize (a process-static
      # mutex) and retry the initial connection, so no special flags are needed.
      - name: Test Postgres adapter
        run: cargo test -p dent8-store-postgres --features adapter
      # The CLI/MCP-over-Postgres path itself (not just the adapter crate): build it and run a
      # live end-to-end assert -> supersede -> explain -> verify, so the runnable Postgres
      # surface is regression-covered.
      - name: Build CLI with Postgres feature
        run: cargo build -p dent8-cli --features postgres
      - name: CLI end-to-end over live Postgres
        env:
          DENT8_STORE_URL: postgres://postgres:dent8@localhost:5432/dent8
        run: |
          set -euo pipefail
          BIN=target/debug/dent8
          "$BIN" assert repo:ci-e2e database postgres --authority high --source source:ci
          "$BIN" supersede repo:ci-e2e database mysql --authority high --source source:ci
          output="$("$BIN" explain repo:ci-e2e database)"
          printf '%s\n' "$output"
          grep -q 'value         : "mysql"' <<< "$output"
          "$BIN" verify

  # A `cargo kani` CI job over the dent8-core proof harnesses was attempted but reverted: the
  # official kani-github-action's pinned nightly (Kani 0.67, nightly-2025-11-21) does not build
  # this edition-2024 workspace (`cargo` exits 101 with 0 compilation errors). The harnesses are
  # real (`#[cfg(kani)] #[kani::proof]` in dent8-core) and run manually with a local `cargo
  # kani`; wiring a green CI job is a tracked follow-up once a compatible toolchain is pinned.
