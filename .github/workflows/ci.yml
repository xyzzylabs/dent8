name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      # The workspace is kept clippy-clean; treat any warning as an error in CI.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # The Postgres adapter is feature-gated; compile-check + lint it too.
      - run: cargo clippy -p dent8-store-postgres --features adapter --all-targets -- -D warnings
      # The CLI's Postgres backend is feature-gated; compile-check + lint it too.
      - run: cargo clippy -p dent8-cli --features postgres --all-targets -- -D warnings
      # The CLI's witness commands (Ed25519 signed tree heads) are feature-gated; lint + test.
      - run: cargo clippy -p dent8-cli --features witness --all-targets -- -D warnings
      # The asymmetric (signed) anchor is feature-gated; lint + test it too.
      - run: cargo clippy -p dent8-core --features signed-anchor --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test -p dent8-core --features signed-anchor
      - run: cargo test -p dent8-cli --features witness

  postgres:
    name: M2b adapter (live Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dent8
          POSTGRES_DB: dent8
        ports:
          - 5432:5432
        # Gate the job on the DB actually accepting connections.
        options: >-
          --health-cmd "pg_isready -U postgres -d dent8"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    env:
      # The adapter's integration tests run only when DATABASE_URL is set (they skip
      # otherwise — see crates/dent8-store-postgres/src/adapter.rs).
      DATABASE_URL: postgres://postgres:dent8@localhost:5432/dent8
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The integration tests share one database; they self-serialize (a process-static
      # mutex) and retry the initial connection, so no special flags are needed.
      - run: cargo test -p dent8-store-postgres --features adapter
      # The CLI/MCP-over-Postgres path itself (not just the adapter crate): build it and run a
      # live end-to-end assert -> supersede -> explain -> verify, so the runnable Postgres
      # surface is regression-covered.
      - run: cargo build -p dent8-cli --features postgres
      - name: CLI end-to-end over live Postgres
        env:
          DENT8_DATABASE_URL: postgres://postgres:dent8@localhost:5432/dent8
        run: |
          set -euo pipefail
          BIN=target/debug/dent8
          "$BIN" assert repo ci-e2e database postgres high owner
          "$BIN" supersede repo ci-e2e database mysql high owner
          "$BIN" explain repo ci-e2e database | grep -q mysql
          "$BIN" verify

  # A `cargo kani` CI job over the dent8-core proof harnesses was attempted but reverted: the
  # official kani-github-action's pinned nightly (Kani 0.67, nightly-2025-11-21) does not build
  # this edition-2024 workspace (`cargo` exits 101 with 0 compilation errors). The harnesses are
  # real (`#[cfg(kani)] #[kani::proof]` in dent8-core) and run manually with a local `cargo
  # kani`; wiring a green CI job is a tracked follow-up once a compatible toolchain is pinned.
